{{- $nsName := "capacity-benchmark" -}}
{{- $vmCount := .vmCount -}}
{{- $vmName := "capacity-test" -}}
{{- $vmCreateJobName := (nospace (cat "create-vms-" (.counter | toString ))) -}}
{{- $sshPublicKeySecretName := "burner-ssh-public" -}}
{{- $rootVolumeSize := 6 -}}
{{- $dataVolumeSize := 1 -}}
{{- $volumeLabelKey := "test-capacity-benchmark/volume-type" -}}
{{- $volumeLabelValueRoot := "root" -}}
{{- $volumeLabelValueData := "data" -}}
{{- $jobCounterLabelKey := "test-capacity-benchmark/counter" -}}
{{- $jobCounterLabelValue := (nospace (cat "counter-" (.counter | toString ))) -}}
{{- $vmSnapshotJobName := (nospace (cat "snapshot-vms-" (.counter | toString ))) -}}
---
global:
  # gc: true
  measurements:
  # - name: podLatency
  - name: vmiLatency
  # - name: nodeLatency

metricsEndpoints:
- indexer:
    type: local
    metricsDirectory: "./metrics-{{ .counter | toString }}"

jobs:
- name: {{ $vmCreateJobName }}
  jobType: create
  jobIterations: 1
  qps: 20
  burst: 20
  namespacedIterations: false
  namespace: {{ $nsName }}
  # verify object count after running each job
  verifyObjects: true
  errorOnVerify: true
  # interval between jobs execution
  jobIterationDelay: 20s
  # wait all VMI be in the Ready Condition
  waitWhenFinished: false
  podWait: true
  # timeout time after waiting for all object creation
  maxWaitTimeout: 15m
  jobPause: 10s
  # cleanup cleans previous execution (not deleted or failed)
  cleanup: true
  # Set missing key as empty to allow using default values
  defaultMissingKeysWithZero: true
  beforeCleanup: "./check_vm_running.sh {{ $vmCreateJobName }} {{ $nsName }} {{ .privateKey }} fedora"
  objects:

  - objectTemplate: templates/secret_ssh_public.yml
    runOnce: true
    replicas: 1
    inputVars:
      name: {{ $sshPublicKeySecretName }}
      counter: {{ .counter | toString }}
      publicKeyPath: {{ .publicKey }}

  - objectTemplate: templates/vm.yml
    replicas: {{ $vmCount }}
    inputVars:
      name: {{ $vmName }}
      counter: {{ .counter | toString }}
      rootDiskImage: quay.io/containerdisks/fedora:latest
      storageClassName: ontap-iscsi
      rootVolumeLabels:
        {{ $volumeLabelKey }}: {{ $volumeLabelValueRoot }}
        {{ $jobCounterLabelKey }}: {{ $jobCounterLabelValue }}
      rootVolumeSize: "{{ $rootVolumeSize | toString }}Gi"
      dataVolumeSize: "{{ $dataVolumeSize | toString }}Gi"
      dataVolumeLabels:
        {{ $volumeLabelKey }}: {{ $volumeLabelValueData }}
        {{ $jobCounterLabelKey }}: {{ $jobCounterLabelValue }}
      sshPublicKeySecret: {{ $sshPublicKeySecretName }}

- name: resize-volumes
  jobType: patch
  jobIterations: 1
  jobIterationDelay: 15s
  executionMode: sequential
  qps: 20
  burst: 20
  beforeCleanup: "./check_resize.sh {{ $vmCreateJobName }} {{ $nsName }} {{ .privateKey }} fedora 7G 2G"
  objects:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    labelSelector:
      {{ $volumeLabelKey }}: {{ $volumeLabelValueData }}
      {{ $jobCounterLabelKey }}: {{ $jobCounterLabelValue }}
    patchType: "application/strategic-merge-patch+json"
    objectTemplate: templates/resize_pvc.yml
    inputVars:
      storageSize: "{{ add $dataVolumeSize 1 | toString }}Gi"
  - apiVersion: v1
    kind: PersistentVolumeClaim
    labelSelector:
      {{ $volumeLabelKey }}: {{ $volumeLabelValueRoot }}
      {{ $jobCounterLabelKey }}: {{ $jobCounterLabelValue }}
    patchType: "application/strategic-merge-patch+json"
    objectTemplate: templates/resize_pvc.yml
    inputVars:
      storageSize: "{{ add $rootVolumeSize 1 | toString }}Gi"

- name: restart-vms
  jobType: kubevirt
  qps: 20
  burst: 20
  jobIterations: 1
  maxWaitTimeout: 1h
  objectDelay: 1m
  beforeCleanup: "./check_vm_running.sh {{ $vmCreateJobName }} {{ $nsName }} {{ .privateKey }} fedora"
  objects:
  - kubeVirtOp: restart
    labelSelector:
      kube-burner-job: {{ $vmCreateJobName }}

- name: {{ $vmSnapshotJobName }}
  jobType: create
  qps: 20
  burst: 20
  jobIterations: 1
  maxWaitTimeout: 1h
  namespacedIterations: false
  namespace: {{ $nsName }}
  # verify object count after running each job
  verifyObjects: true
  errorOnVerify: true
  # interval between jobs execution
  jobIterationDelay: 20s
  # wait all VMI be in the Ready Condition
  waitWhenFinished: false
  podWait: true
  # timeout time after waiting for all object creation
  jobPause: 10s
  # cleanup cleans previous execution (not deleted or failed)
  cleanup: false
  # Set missing key as empty to allow using default values
  defaultMissingKeysWithZero: true
  preLoadImages: false
  objects:
  - objectTemplate: templates/vm-snapshot.yml
    replicas: {{ $vmCount }}
    inputVars:
      name: {{ $vmName }}
      counter: {{ .counter | toString }}
    waitOptions:
      forCondition: Ready

- name: migrate-vms
  jobType: kubevirt
  qps: 20
  burst: 20
  jobIterations: 1
  maxWaitTimeout: 1h
  objectDelay: 1m
  beforeCleanup: "./check_vm_running.sh {{ $vmCreateJobName }} {{ $nsName }} {{ .privateKey }} fedora"
  objects:
  - kubeVirtOp: migrate
    labelSelector:
      kube-burner-job: {{ $vmCreateJobName }}
